name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: 1144158800/runmax-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Redeploy on Railway
        run: |
          npm install -g @railway/cli
          railway redeploy --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 78a3b453-3d8e-4a7c-8bc0-63f4ffe3dc5c
          RAILWAY_SERVICE_ID: 5cefd885-a276-474d-9026-6ab5db02f2a1
          RAILWAY_ENVIRONMENT_ID: 54822ae9-6827-4aaa-9b02-e71db7289d2e
